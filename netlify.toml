[build]
  command = "cd frontend && npm run build"
  publish = "frontend/dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10"

# Redirect all API requests to backend
[[redirects]]
  from = "/api/*"
  to = "https://your-backend-api.com/:splat"
  status = 200
  force = true

# SPA redirect
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Edge functions for serverless (optional)
[edge]
  bundle = true